<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Web Dashboard</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --panel-color: #161820;
            --border-color: #242736;
            --text-main: #ffffff;
            --text-muted: #808a9d;
            --accent-green: #00ffa3;
            --accent-red: #ff3b30;
            --accent-blue: #007aff;
            --input-bg: #1f222e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        /* Ticker Card Styles */
        .ticker-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ticker-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .ticker-card:hover {
            transform: translateY(-2px);
            background-color: rgba(255, 255, 255, 0.04);
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a3f58, #1f222e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .asset-name {
            font-weight: 600;
            font-size: 16px;
        }

        .asset-symbol {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 2px;
        }

        .asset-math {
            text-align: right;
        }

        .asset-price {
            font-weight: 700;
            font-size: 16px;
        }

        .asset-change {
            font-size: 13px;
            margin-top: 4px;
            font-weight: 500;
        }

        .trend-up { color: var(--accent-green); }
        .trend-down { color: var(--accent-red); }

        /* Swap Component Styles */
        .swap-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            width: 60%;
            outline: none;
        }

        .token-select {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .swap-divider {
            display: flex;
            justify-content: center;
            margin: -8px 0;
            z-index: 2;
        }

        .swap-arrow-btn {
            background-color: var(--border-color);
            border: none;
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .details-panel {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .details-row {
            display: flex;
            justify-content: space-between;
        }

        .swap-btn {
            background: linear-gradient(90deg, #007aff, #0051a8);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .swap-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="panel">
            <h2>Live Market Quotes</h2>
            <div class="ticker-list" id="ticker-container">
                </div>
        </div>

        <div class="panel">
            <h2>Atomic Swap Router</h2>
            <div class="swap-box">
                
                <div class="input-group">
                    <input type="number" id="swap-input-value" value="1.5" step="any" placeholder="0.0">
                    <select class="token-select" id="from-token-selector">
                        <option value="ETH" selected>ETH</option>
                        <option value="BTC">BTC</option>
                        <option value="SOL">SOL</option>
                    </select>
                </div>

                <div class="swap-divider">
                    <button class="swap-arrow-btn">↓</button>
                </div>

                <div class="input-group">
                    <input type="text" id="swap-output-value" readonly value="0.0">
                    <select class="token-select" id="to-token-selector" disabled>
                        <option value="USDC">USDC</option>
                    </select>
                </div>

                <div class="details-panel">
                    <div class="details-row">
                        <span>Exchange Rate</span>
                        <span id="rate-display">1 ETH = 1709.23 USDC</span>
                    </div>
                    <div class="details-row">
                        <span>Router Fee (0.1%)</span>
                        <span id="fee-display">0.0015 ETH</span>
                    </div>
                </div>

                <button class="swap-btn" id="execute-swap-action">Execute Cross-Chain Swap</button>
            </div>
        </div>

    </div>

    <script>
        // --- REAL WORLD PRICING DATABASE STATE ---
        const assetDatabase = {
            BTC: { base: 63016.75, change: "-2.22%", trendUp: false, label: "Bitcoin" },
            ETH: { base: 1709.25, change: "-2.19%", trendUp: false, label: "Ethereum" },
            SOL: { base: 69.75, change: "-3.02%", trendUp: false, label: "Solana" },
            USDC: { base: 1.00, change: "0.00%", trendUp: true, label: "USD Coin" }
        };

        // Render Live Tickers
        function initDashboardTickers() {
            const container = document.getElementById('ticker-container');
            container.innerHTML = ''; // reset state
            
            Object.keys(assetDatabase).forEach(symbol => {
                if(symbol === 'USDC') return; // Skip steady coin layout
                
                const asset = assetDatabase[symbol];
                const card = document.createElement('div');
                card.className = 'ticker-card';
                card.innerHTML = `
                    <div class="asset-info">
                        <div class="asset-icon">${symbol}</div>
                        <div>
                            <div class="asset-name">${asset.label}</div>
                            <div class="asset-symbol">${symbol}</div>
                        </div>
                    </div>
                    <div class="asset-math">
                        <div class="asset-price">$${asset.base.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="asset-change ${asset.trendUp ? 'trend-up' : 'trend-down'}">${asset.change}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Processing Mathematics for Active Swap Form
        function calculateSwapOutputs() {
            const fromToken = document.getElementById('from-token-selector').value;
            const inputAmount = parseFloat(document.getElementById('swap-input-value').value) || 0;
            
            const fromPrice = assetDatabase[fromToken].base;
            const targetPrice = assetDatabase['USDC'].base; 

            // Calculate precise value exchange conversion rate
            const rawRate = fromPrice / targetPrice;
            const totalValueBeforeFees = inputAmount * rawRate;
            
            // Apply a small backend liquidity router processing fee (e.g., 0.1%)
            const platformFee = totalValueBeforeFees * 0.001;
            const cleanOutputValue = totalValueBeforeFees - platformFee;

            // Paint application state directly onto DOM nodes safely
            document.getElementById('swap-output-value').value = cleanOutputValue.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 4
            });
            
            document.getElementById('rate-display').innerText = `1 ${fromToken} = ${rawRate.toFixed(2)} USDC`;
            document.getElementById('fee-display').innerText = `${(inputAmount * 0.001).toFixed(4)} ${fromToken}`;
        }

        // Attach listeners to interface triggers
        document.getElementById('swap-input-value').addEventListener('input', calculateSwapOutputs);
        document.getElementById('from-token-selector').addEventListener('change', calculateSwapOutputs);
        document.getElementById('execute-swap-action').addEventListener('click', () => {
            alert('Atomic swap route transaction broadcast successfully to validator memory pool!');
        });

        // Fire rendering cycle routines on frame loading ready confirmation
        window.addEventListener('DOMContentLoaded', () => {
            initDashboardTickers();
            calculateSwapOutputs();
        });
    </script>
</body>
</html>

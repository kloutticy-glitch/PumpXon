<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMPXON SYSTEM</title>
    <style>
        :root {
            --bg-dark: #030206;
            --panel-dark: rgba(13, 11, 22, 0.75);
            --neon-pink: #ff0055;
            --neon-green: #39ff14;
            --neon-cyan: #00f0ff;
            --neon-purple: #9d4edd;
        }

        body { font-family: 'Arial Black', sans-serif; background-color: var(--bg-dark); color: #ffffff; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* Mascot Engine */
        #mascot-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; overflow: hidden; }
        .floating-mascot { position: absolute; bottom: -60px; pointer-events: none; user-select: none; font-size: 30px; }
        @keyframes floatLeft { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; } }
        @keyframes floatRight { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateY(-115vh) rotate(-360deg); opacity: 0; } }

        /* UI Styles */
        header { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; padding: 40px 20px; z-index: 2; position: relative; }
        .nav-btn { background: #1a1528; border: 1px solid #3c2f5c; color: #8b859e; padding: 10px 16px; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .nav-btn.active { background: var(--neon-purple); color: #fff; border-color: var(--neon-purple); }
        .app-section { display: none; width: 100%; max-width: 1100px; padding: 20px; z-index: 2; position: relative; }
        .active-section { display: block; }
        .trader-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .trader-card { background: var(--panel-dark); border: 1px solid #2d2344; padding: 20px; border-radius: 12px; }
        .node-btn { background: transparent; border: 1px solid var(--neon-cyan); color: #fff; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        .portal-card { background: var(--panel-dark); padding: 40px; border-radius: 12px; border: 1px solid var(--neon-purple); }
        .wallet-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: #1a1528; border: 1px solid #3c2f5c; color: white; cursor: pointer; }
        .address-box { width: 100%; padding: 15px; background: #000; border: 1px solid #3c2f5c; color: var(--neon-green); box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="mascot-container"></div>

    <header>
        <div style="font-size: 26px; font-weight: 900; background: linear-gradient(90deg, #ff0055, #00f0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">⚡ PUMPXON SYSTEM</div>
        <nav>
            <button class="nav-btn active" onclick="switchSection('airdrop', this)">Airdrop</button>
            <button class="nav-btn" onclick="switchSection('market', this)">Market</button>
            <button class="nav-btn" onclick="switchSection('copytrade', this)">Copytrade</button>
            <button class="nav-btn" onclick="switchSection('nodes', this)">Nodes</button>
            <button class="nav-btn" onclick="switchSection('vault', this)">Vault</button>
        </nav>
    </header>

    <section id="airdrop" class="app-section active-section">
        <div class="portal-card">
            <button class="wallet-btn" onclick="connectMetaMask()">Initialize MetaMask</button>
            <button class="wallet-btn" onclick="connectPhantom()">Initialize Phantom</button>
            <input class="address-box" id="address" placeholder="awaiting handshakes..." readonly>
        </div>
    </section>

    <section id="market" class="app-section"><h1>LIVE MARKET</h1></section>

    <section id="copytrade" class="app-section">
        <h1>COPYTRADE CORES</h1>
        <div class="trader-grid" id="trader-grid"></div>
    </section>

    <section id="nodes" class="app-section"><h1>NODE VALIDATOR</h1></section>
    <section id="vault" class="app-section"><h1>RARITY VAULT</h1></section>

    <script>
        // Mascot Engine
        setInterval(() => {
            const m = document.createElement('div');
            m.className = 'floating-mascot';
            m.innerText = ['🚀','💰','⚡'][Math.floor(Math.random()*3)];
            m.style.left = Math.random()*100 + 'vw';
            m.style.animation = (Math.random() > 0.5 ? 'floatLeft' : 'floatRight') + ' 10s linear forwards';
            document.getElementById('mascot-container').appendChild(m);
            setTimeout(() => m.remove(), 10000);
        }, 2500);

        // Wallet Logic
        async function connectMetaMask() { document.getElementById('address').value = "0x" + Math.random().toString(16).slice(2, 10); }
        async function connectPhantom() { document.getElementById('address').value = "SOL-" + Math.random().toString(36).slice(2, 10); }

        // Copytrade Generator (48 Wallets)
        const grid = document.getElementById('trader-grid');
        for(let i=1; i<=48; i++) {
            const card = document.createElement('div');
            card.className = 'trader-card';
            card.innerHTML = `<div>BOT #${1000+i}</div><button class="node-btn" onclick="simulateCopyTradeLink(this)">Mirror Wallet</button>`;
            grid.appendChild(card);
        }

        // Connection Guardrail
        function simulateCopyTradeLink(btn) {
            const addr = document.getElementById('address').value;
            if(!addr || addr === "awaiting handshakes...") {
                btn.innerText = "CONNECT WALLET FIRST!";
                setTimeout(() => btn.innerText = "Mirror Wallet", 2000);
            } else {
                btn.innerText = "MIRRORING ✓";
            }
        }

        function switchSection(id, btn) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-section');
            btn.classList.add('active');
        }
    </script>
</body>
</html>

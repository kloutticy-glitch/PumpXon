    <style>

        .custom-cursor.hover { transform: translate(-50%, -50%) scale(2); background: transparent; border: 1px solid var(--neon-cyan); }
        
        /* Ensure inputs remain clickable */
        input { pointer-events: auto !important; }

        @keyframes pulseGlow { 0% { transform: scale(1) translate(0, 0); opacity: 0.6; } 100% { transform: scale(1.15) translate(-30px, -20px); opacity: 0.9; } }

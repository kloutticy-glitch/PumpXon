<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMPXON // DEPLOYMENT MATRIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-dark: #030206;
            --panel-dark: rgba(13, 11, 22, 0.75);
            --neon-pink: #ff0055;
            --neon-green: #39ff14;
            --neon-cyan: #00f0ff;
            --neon-purple: #9d4edd;
            --solana-glow: linear-gradient(135deg, #ab9ff2 0%, #4e44ce 100%);
        }

        * { cursor: none; }
        .custom-cursor { position: fixed; top: 0; left: 0; width: 8px; height: 8px; background: var(--neon-cyan); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon-cyan); transition: transform 0.1s ease-out, background 0.2s; }
        .custom-cursor.click { transform: translate(-50%, -50%) scale(1.5); background: var(--neon-pink); }

        body { font-family: 'Arial Black', sans-serif; background-color: var(--bg-dark); color: #ffffff; margin: 0; min-height: 100vh; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; }

        header { width: 100%; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; padding: 40px 20px; }
        .nav-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid #1a1528; color: #8b859e; padding: 10px 16px; border-radius: 6px; text-transform: uppercase; font-size: 11px; transition: all 0.2s; }
        .nav-btn.active { background: var(--neon-purple); color: #ffffff; border-color: var(--neon-purple); }

        .app-section { display: none; width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px; }
        .app-section.active-section { display: block; }

        .main-container { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 50px; }
        .portal-card { background: var(--panel-dark); border: 2px solid var(--neon-purple); border-radius: 12px; padding: 40px; }

        .coin-row { display: grid; grid-template-columns: 0.5fr 1.5fr 1fr 1fr; align-items: center; background: var(--panel-dark); border: 1px solid #1a1528; padding: 20px 30px; border-radius: 10px; margin-bottom: 10px; }
        
        .trollbox { background: rgba(9, 7, 15, 0.8); border: 1px solid #2d2344; border-radius: 8px; margin-top: 30px; }
        .trollbox-messages { height: 150px; overflow-y: auto; padding: 15px; font-family: monospace; }
        .trollbox-input { display: flex; border-top: 1px solid #2d2344; }
        .trollbox-input input { flex: 1; background: transparent; border: none; padding: 12px; color: white; outline: none; }
    </style>
</head>
<body>
    <div class="custom-cursor" id="cursor"></div>
    <canvas id="bg-canvas"></canvas>

    <header>
        <div style="font-size: 26px; font-weight: 900; background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">⚡ PUMPXON SYSTEM</div>
        <nav>
            <button class="nav-btn active" onclick="switchSection('airdrop', this)">Airdrop</button>
            <button class="nav-btn" onclick="switchSection('market', this)">Market</button>
            <button class="nav-btn" onclick="switchSection('copytrade', this)">Copytrade</button>
        </nav>
    </header>

    <section id="airdrop" class="app-section active-section">
        <div class="main-container">
            <main>
                <h1>THE DIGITAL<br><span>MATRIX.</span></h1>
                <div class="trollbox">
                    <div class="trollbox-messages" id="chat-box"></div>
                    <div class="trollbox-input">
                        <input type="text" id="chat-input" placeholder="Transmit...">
                        <button onclick="sendChatMessage()">SEND</button>
                    </div>
                </div>
            </main>
            <aside class="portal-card">
                <button class="nav-btn" onclick="alert('Wallet connected')">Initialize Wallet</button>
            </aside>
        </div>
    </section>

    <section id="market" class="app-section">
        <h1>LIVE MARKET</h1>
        <div class="coin-row"><span>🪙</span><span>Bitcoin</span><span>$68,240</span><span>+2.4%</span></div>
        <div class="coin-row"><span>🔷</span><span>Ethereum</span><span>$3,540</span><span>+1.8%</span></div>
        <div class="coin-row"><span>◎</span><span>Solana</span><span>$148.90</span><span>-0.5%</span></div>
    </section>

    <section id="copytrade" class="app-section">
        <h1>COPYTRADE CORES</h1>
        <div id="wallet-list"></div>
    </section>

    <script>
        // Copytrade Database
        const wallets = ["0x88A...4F1", "sol:9Av...K2q", "0x11B...99C", "0x55F...22A", "sol:3Xp...L9m", "0xAA4...11B", "0x77C...22X", "sol:8Lm...P4k"];
        const list = document.getElementById('wallet-list');
        wallets.forEach(w => {
            list.innerHTML += `<div class="coin-row" style="cursor:none;" onclick="alert('Mirroring wallet: ${w}')"><span>👤</span><span>${w}</span><span style="color:var(--neon-green)">+${Math.floor(Math.random()*500)}% ROI</span><span>MIRROR</span></div>`;
        });

        function switchSection(id, btn) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(input.value) {
                document.getElementById('chat-box').innerHTML += `<div><b>YOU</b>: ${input.value}</div>`;
                input.value = '';
            }
        }

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        document.addEventListener('mousedown', () => cursor.classList.add('click'));
        document.addEventListener('mouseup', () => cursor.classList.remove('click'));
    </script>
</body>
</html>

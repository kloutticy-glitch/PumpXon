<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMPXON // DEPLOYMENT MATRIX</title>
    <style>
        :root {
            --bg-dark: #030206;
            --panel-dark: rgba(13, 11, 22, 0.75);
            --neon-pink: #ff0055;
            --neon-green: #39ff14;
            --neon-cyan: #00f0ff;
            --neon-purple: #9d4edd;
            --solana-glow: linear-gradient(135deg, #ab9ff2 0%, #4e44ce 100%);
        }

        body {
            font-family: 'Arial Black', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Mascot Container Layer - Placed safely in background */
        #mascot-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-mascot {
            position: absolute;
            bottom: -60px;
            pointer-events: none;
            user-select: none;
            filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.4));
        }

        /* Natural swaying animation tracks */
        @keyframes floatLeft {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            35% { transform: translateY(-35vh) translateX(-35px) rotate(90deg); }
            70% { transform: translateY(-75vh) translateX(15px) rotate(210deg); }
            90% { opacity: 0.5; }
            100% { transform: translateY(-115vh) translateX(-25px) rotate(360deg); opacity: 0; }
        }

        @keyframes floatRight {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            35% { transform: translateY(-35vh) translateX(35px) rotate(-90deg); }
            70% { transform: translateY(-75vh) translateX(-15px) rotate(-210deg); }
            90% { opacity: 0.5; }
            100% { transform: translateY(-115vh) translateX(25px) rotate(-360deg); opacity: 0; }
        }

        .ambient-glow-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 85, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -50px;
            left: -100px;
            z-index: -2;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            font-family: 'Arial Black', sans-serif;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #1a1528;
            color: #8b859e;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: #ffffff;
            border-color: var(--neon-cyan);
        }

        .nav-btn.active {
            background: var(--neon-purple);
            color: #ffffff;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
        }

        .app-section {
            display: none; 
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
            animation: fadeIn 0.3s ease-in-out;
        }

        .app-section.active-section {
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
